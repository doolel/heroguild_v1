<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>HEROGUILD V1 - COMMAND CENTER</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 20px; }
        .dashboard { border: 2px solid #35104a; padding: 15px; border-radius: 8px; background: #121212; }
        .stat-box { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .capital { color: #00ff41; font-size: 1.5em; text-shadow: 0 0 5px #00ff41; }
        .ammo { color: #ff3e3e; }
        .log-container { background: #050505; border: 1px solid #444; height: 300px; overflow-y: auto; padding: 10px; font-size: 0.9em; }
        .skill-tag { padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 8px; }
        .pulse { background: #00d2ff; color: #000; }
        .bottom { background: #32cd32; color: #000; }
        .sink { background: #8a2be2; color: #fff; }
        .hammer { background: #ff4500; color: #fff; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stat-box">
        <div>
            <span>RESERVE CAPITAL: </span>
            <span id="capital-val" class="capital">$216,189.50</span> </div>
        <div>
            <span>AMMO: </span>
            <span id="ammo-val" class="ammo">84.1%</span>
        </div>
    </div>

    <h3>ACTIVE SKILLS & RUNS</h3>
    <div id="skill-log" class="log-container">
        <div>[<span class="skill-tag pulse">BULL-PULSE</span>] Run #862: +$85.00 generated.</div>
        <div>[<span class="skill-tag bottom">CREATE-BOTTOM</span>] Stability confirmed.</div>
        <div>[<span class="skill-tag hammer">AUTO-HAMMER</span>] Psychic Surge Detected!</div>
    </div>
</div>

<script>
    // Funktion för att simulera den passiva loggen från din mewtwo_auto.js
    function updateLog(skill, amount) {
        const log = document.getElementById('skill-log');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        entry.innerHTML = `[${time}] <span class="skill-tag ${skill}">${skill.toUpperCase()}</span> Run active...`;
        log.prepend(entry);
    }
    // Denna del kopplas senare till din ledger_beacon.js
</script>

</body>
</html>
