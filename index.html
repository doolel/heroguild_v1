<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROGUILD | 0033-PULS GLOBAL</title>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        .dashboard { max-width: 900px; margin: auto; border: 1px solid #333; padding: 20px; box-shadow: 0 0 20px rgba(53, 255, 53, 0.05); }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #35m; padding-bottom: 10px; margin-bottom: 20px; }
        .capital { color: #32cd32; font-size: 1.5em; font-weight: bold; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; font-size: 0.9em; }
        .xp-container { width: 100%; background: #222; border: 1px solid #444; height: 12px; margin: 10px 0; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #32cd32, #adff2f); transition: width 0.5s; }
        .log-container { background: #000; border: 1px solid #333; height: 400px; overflow-y: scroll; padding: 10px; font-size: 0.85em; color: #aaa; display: flex; flex-direction: column-reverse; }
        .log-entry { margin-bottom: 5px; border-left: 2px solid #444; padding-left: 10px; animation: fadeIn 0.3s; }
        .log-time { color: #555; margin-right: 10px; }
        .loot-epic { color: #35m; font-weight: bold; }
        .loot-gold { color: #f7931a; }
        .lvl-up { color: #ff00ff; text-transform: uppercase; font-weight: bold; border-top: 1px solid #ff00ff; margin-top: 10px; padding-top: 5px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .wallet-box { margin-top: 20px; border: 1px dashed #555; padding: 10px; text-align: center; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <div>HEROGUILD_V1 // RPG-LOOTER</div>
        <div id="guild-lvl">LVL: 1</div>
    </div>

    <div class="capital">
        RESERVE: <span id="banked-amount">$216,189.50</span>
    </div>

    <div class="xp-container">
        <div id="xp-bar"></div>
    </div>

    <div class="stats">
        <div>AMMO: <span id="ammo-val" style="color: #ff4500;">84.1%</span></div>
        <div>SESSION GAIN: <span id="session-profit" style="color: #32cd32;">+$0.00</span></div>
        <div>MODE: <span style="color: #35m;">ACTIVE_INSCRIBE</span></div>
    </div>

    <div class="log-container" id="event-log">
        <div class="log-entry"><span class="log-time">[SYSTEM]</span> Motorn startad. Väntar på Binance-puls...</div>
    </div>

    <div class="wallet-box">
        <span style="color: #f7931a;">BTC_DONATION_NODE:</span><br>
        <code>bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh</code>
    </div>
</div>

<script>
    let capital = 216189.50;
    let sessionProfit = 0;
    let exp = 0;
    let lvl = 1;
    const logElement = document.getElementById('event-log');

    const events = [
        { msg: "Inscribed Rune #", type: "loot-epic", gain: 85 },
        { msg: "Common Drop: BTC Volatility scalp", type: "normal", gain: 12 },
        { msg: "Institutional liquidity absorbed", type: "loot-gold", gain: 150 },
        { msg: "Mewtwo Psychic Surge detected", type: "loot-epic", gain: 210 },
        { msg: "RUNE/BTC support retest - Banked profit", type: "normal", gain: 45 },
        { msg: "Passive yield from 2.9% default config", type: "normal", gain: 5 },
        { msg: "Decentralized node contribution", type: "loot-gold", gain: 95 }
    ];

    function addLog(message, type) {
        const now = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'log-entry ' + (type || '');
        div.innerHTML = `<span class="log-time">[${now}]</span> ${message}`;
        logElement.prepend(div);
    }

    function updateSystem() {
        // Slumpmässig händelse från vår "vän-metod"
        const event = events[Math.floor(Math.random() * events.length)];
        const randomGain = event.gain + (Math.random() * 20);
        
        // Uppdatera värden
        capital += randomGain;
        sessionProfit += randomGain;
        exp += (randomGain * 1.5);

        // UI-uppdateringar
        document.getElementById('banked-amount').innerText = `$${capital.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        document.getElementById('session-profit').innerText = `+$${sessionProfit.toFixed(2)}`;
        
        // XP-logik
        let xpPercent = (exp / 1000) * 100;
        document.getElementById('xp-bar').style.width = xpPercent + '%';

        addLog(`${event.msg} (+ $${randomGain.toFixed(2)})`, event.type);

        if (exp >= 1000) {
            lvl++;
            exp = 0;
            document.getElementById('guild-lvl').innerText = `LVL: ${lvl}`;
            addLog(`>>> LEVEL UP: HEROGUILD IS NOW LEVEL ${lvl} <<<`, 'lvl-up');
        }
    }

    // Körs var 7:e sekund för att simulera oändliga marknadshändelser
    setInterval(updateSystem, 7000);
</script>

</body>
</html>
